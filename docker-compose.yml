version: "3.8"

services:
  ports:
    image: ghcr.io/${GHCR_OWNER:-macedot}/ports:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ports
    pid: "host"
    network_mode: "host"
    environment:
      PORT: "8080"
      CACHE_TTL: "2s"
    restart: unless-stopped
