services:
  ports:
    image: ghcr.io/${GHCR_OWNER:-macedot}/ports:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ports
    ports:
      - "8080:8080"
    volumes:
      - /proc:/host-proc:ro
      # Optional: Docker container monitoring
      # Uncomment to enable container name/image detection for sockets
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: "8080"
      PROC_PATH: "/host-proc"
      CACHE_TTL: "2s"
      # DOCKER_HOST: "/var/run/docker.sock"  # Required when docker.sock volume is mounted
      # ADMIN_TOKEN: "change-me"  # Set a strong token to enable authentication
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    restart: unless-stopped
