services:
  ports:
    image: ghcr.io/${GHCR_OWNER:-macedot}/ports:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ports
    ports:
      - "8080:8080"
    volumes:
      - /proc:/host-proc:ro
      # Optional: Docker container monitoring
      # Uncomment BOTH the volume AND group_add to enable container detection.
      # The container runs as UID 65534 (nobody); group_add joins the docker
      # group so the socket is accessible. Get your host GID with:
      #   getent group docker | cut -d: -f3
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    # group_add:
      # - "999"  # ← replace with your host's docker group GID
    environment:
      PORT: "8080"
      PROC_PATH: "/host-proc"
      CACHE_TTL: "10s"
      # DOCKER_HOST: "/var/run/docker.sock"  # Required when docker.sock volume is mounted
      # ADMIN_TOKEN: "change-me"  # Set a strong token to enable authentication
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    restart: unless-stopped
