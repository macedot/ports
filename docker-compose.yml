services:
  ports:
    image: ghcr.io/${GHCR_OWNER:-macedot}/ports:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ports
    ports:
      - "8080:8080"
    volumes:
      - /proc:/host-proc:ro
      - /etc/localtime:/etc/localtime:ro
      # Optional: Docker container monitoring
      #
      # 1. Find your host docker GID:
      #    getent group docker | cut -d: -f3
      #
      # 2. Uncomment the 3 lines below and replace 999 with your GID.
      #    The container runs as UID 65534 (nobody). Setting user:
      #    "65534:<gid>" makes docker the primary group so the socket
      #    is readable. Without this, container detection fails silently.
      #
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    # user: "65534:999"
    pid: host  # required: process resolution needs host PID namespace
    # user: "0:0"  # uncomment to run as root for full process resolution
    #                (image default is 65534:65534 — some host processes may be unreadable)
    environment:
      PORT: "8080"
      PROC_PATH: "/host-proc"
      CACHE_TTL: "10s"
      # DOCKER_HOST: "/var/run/docker.sock"
      # ADMIN_TOKEN: "change-me"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_add:
      - SYS_PTRACE  # required for readlink /proc/[pid]/fd/ (socket→PID mapping)
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    restart: unless-stopped
